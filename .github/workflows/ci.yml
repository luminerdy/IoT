name: CI

on:
  pull_request:
  push:
    branches: ["main", "codex/**"]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Compile Python
        run: python -m compileall app scripts
      - name: Test Python
        run: pytest

  firmware-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio
      - name: Prepare sample firmware secrets
        run: cp firmware/include/secrets.sample.h firmware/include/secrets.h
      - name: Check firmware
        run: platformio check -d firmware
